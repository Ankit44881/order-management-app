name: CI-CD to GKE

on:
  push:
    branches:
      - main

  workflow_dispatch:
    
permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: us-central1-docker.pkg.dev/project-e88d1c23-e44c-4d58-8dd/om-app-repo/nginx-demo
  CLUSTER_NAME: gke-cluster
  CLUSTER_LOCATION: us-central1-a

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/198436119624/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: git-hub-access-sa@project-e88d1c23-e44c-4d58-8dd.iam.gserviceaccount.com

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Generate Short SHA
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$SHORT_SHA .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:$SHORT_SHA

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}

      - name: Verify Cluster Connection
        run: |
          kubectl get nodes

      - name: Deploy Application
        run: |
          if kubectl get deployment nginx-demo >/dev/null 2>&1; then
            echo "Deployment exists. Updating image..."

            kubectl set image deployment/nginx-demo \
              nginx-demo=$IMAGE_NAME:$SHORT_SHA

          else
            echo "Deployment does not exist. Creating..."

            kubectl apply -f deployment.yaml
            kubectl apply -f service.yaml

            kubectl set image deployment/nginx-demo \
              nginx-demo=$IMAGE_NAME:$SHORT_SHA
          fi

          echo "Waiting for rollout..."
          kubectl rollout status deployment/nginx-demo --timeout=180s

      - name: Verify Running Image
        run: |
          echo "Current Image:"
          kubectl get deployment nginx-demo \
            -o=jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""

      - name: Verify Deployment
        run: |
          kubectl get deployment nginx-demo
          kubectl get pods -o wide
          kubectl get svc