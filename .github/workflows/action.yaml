name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]  # ⚠️ Note: If your default branch is 'master', change "main" to "master"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the repository files onto the GitHub runner
    - name: Check out the repo
      uses: actions/checkout@v4

    # Step 2: Authenticate with Docker Hub using your GitHub Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    # Step 3: Set up Docker Buildx for optimization and caching capabilities
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 4: Build the container image from the Dockerfile and push it out
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/my-test-app:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/my-test-app:${{ github.sha }}