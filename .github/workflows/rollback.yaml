name: Rollback GKE

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Enter Docker Image Tag (SHORT_SHA)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: us-central1-docker.pkg.dev/project-e88d1c23-e44c-4d58-8dd/om-app-repo/nginx-demo
  CLUSTER_NAME: gke-cluster
  CLUSTER_LOCATION: us-central1-a

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/198436119624/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: git-hub-access-sa@project-e88d1c23-e44c-4d58-8dd.iam.gserviceaccount.com

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}

      - name: Verify Cluster
        run: |
          kubectl get nodes

      - name: Rollback Deployment
        run: |
          echo "Rolling back to image tag: ${{ github.event.inputs.image_tag }}"

          kubectl set image deployment/nginx-demo \
            nginx-demo=$IMAGE_NAME:${{ github.event.inputs.image_tag }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/nginx-demo --timeout=180s

      - name: Verify Running Image
        run: |
          kubectl get deployment nginx-demo \
            -o=jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""