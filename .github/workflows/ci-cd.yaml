name: CI-CD to GKE (Ingress Stack)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/project-e88d1c23-e44c-4d58-8dd/om-app-repo/frontend-image
  BACKEND_IMAGE: us-central1-docker.pkg.dev/project-e88d1c23-e44c-4d58-8dd/om-app-repo/backend-image
  CLUSTER_NAME: gke-cluster
  CLUSTER_LOCATION: us-central1-a
  K8S_PATH: kubernetes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/198436119624/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: git-hub-access-sa@project-e88d1c23-e44c-4d58-8dd.iam.gserviceaccount.com

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Generate Short SHA
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Generate version.json (For Frontend)
        run: |
          cat > app/version.json <<EOF
          {
            "application":"Chai Politics",
            "version":"1.0.${{ github.run_number }}",
            "imageTag":"$SHORT_SHA",
            "commit":"$SHORT_SHA",
            "environment":"Production",
            "cluster":"$CLUSTER_NAME",
            "deployedAt":"$(TZ=Asia/Kolkata date +"%Y-%m-%d %I:%M:%S %p IST")"
          }
          EOF

      # --- 1. FRONTEND BUILD & PUSH ---
      - name: Build Frontend Docker Image
        run: |
          docker build -t $FRONTEND_IMAGE:$SHORT_SHA .

      - name: Push Frontend Docker Image
        run: |
          docker push $FRONTEND_IMAGE:$SHORT_SHA

      # --- 2. BACKEND BUILD & PUSH ---
      - name: Build Backend Docker Image
        run: |
          docker build -t $BACKEND_IMAGE:$SHORT_SHA ./backend

      - name: Push Backend Docker Image
        run: |
          docker push $BACKEND_IMAGE:$SHORT_SHA

      # --- 3. KUBERNETES DEPLOYMENT ---
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}

      - name: Apply All K8s Manifests (Deployments, Services, Ingress)
        run: |
          kubectl apply -f $K8S_PATH/

      - name: Update Container Images Globally
        run: |
          # Aligned with new deployment/container name structures
          kubectl set image deployment/frontend frontend=$FRONTEND_IMAGE:$SHORT_SHA
          kubectl set image deployment/backend backend=$BACKEND_IMAGE:$SHORT_SHA

      - name: Wait for Rollout Status
        run: |
          echo "Checking Frontend status..."
          kubectl rollout status deployment/frontend --timeout=120s
          echo "Checking Backend status..."
          kubectl rollout status deployment/backend --timeout=120s
          
      - name: Show Final Live Resources
        run: |
          kubectl get pods -o wide
          kubectl get svc
          kubectl get ingress