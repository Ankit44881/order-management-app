apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
      - name: nginx-demo
        image: us-east1-docker.pkg.dev/project-e88d1c23-e44c-4d58-8dd/ankit-repo/nginx-demo:385e67330305ca1e1334f92f3af05611cc6d51ea

        ports:
        - containerPort: 80