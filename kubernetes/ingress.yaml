apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chai-politics-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
  - http:
      paths:
      # Route all Backend requests starting with /api
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
              
      # Route all Frontend requests
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80